name: Bootstrap template issues

# GitHub has no native "created from template" event, so this workflow runs on
# the first push to the default branch (creating a repo from a template makes an
# initial commit, which fires this push). The is_template guard skips the
# template repository itself, and the final step removes this workflow plus the
# issue source folder so the whole thing runs exactly once on a new instance.
on:
  push:
    branches: [main]
  # Manual fallback in case the initial template push does not start Actions.
  workflow_dispatch:

jobs:
  create-issues:
    # Skip on the template repo (is_template == true); only run on instances
    # created from it (is_template == false).
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    permissions:
      issues: write    # create the bootstrap issues
      contents: write  # commit removal of the bootstrap files

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Each markdown file in .github/bootstrap-issues/ becomes one issue: the
      # first heading line is used as the title and the remaining content as the
      # body. Files are processed in sorted order so issues are created 1, 2, 3.
      - name: Create onboarding issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in $(ls .github/bootstrap-issues/*.md | sort); do
            title=$(head -n 1 "$file" | sed 's/^#[[:space:]]*//')
            tail -n +2 "$file" > "${RUNNER_TEMP}/issue-body.md"
            gh issue create --title "$title" --body-file "${RUNNER_TEMP}/issue-body.md"
          done

      # Remove this workflow and the issue source folder so the bootstrap only
      # ever runs once. The commit is made with GITHUB_TOKEN, which by design
      # does not trigger another workflow run.
      - name: Remove bootstrap files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/workflows/bootstrap-issues.yml .github/bootstrap-issues
          git commit -m "chore: remove template bootstrap files"
          git push
