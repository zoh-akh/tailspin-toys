# This is the dependabot configuration file that automates dependency updates
# Updates section configures how dependabot should handle dependency updates:
# - Monitors NPM dependencies in the root directory
# - Checks for updates weekly
# - Groups updates based on their type (dev grouped by minor/patch or prod grouped by patch)
#
# Learn more at https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#configuration-options-for-the-dependabotyml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch
    # Hold the classic `typescript` package on v6 until typescript-eslint (typed
    # linting) and @astrojs/check support the native (tsgo) compiler API (~TS 7.1).
    # TypeScript 7 is already adopted side-by-side via the @typescript/native-preview
    # package (used by `npm run typecheck`); merging a classic typescript@7 bump now
    # would break `npm run lint` and `astro check`.
    ignore:
      - dependency-name: "typescript"
        versions: ["7.x"]
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly